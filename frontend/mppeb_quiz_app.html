<!DOCTYPE html>
<html>

<head>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: var(--font-sans);
      color: var(--color-text-primary);
      background: transparent;
      padding: 1rem 0
    }

    .screen {
      display: none
    }

    .screen.active {
      display: block
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 4px
    }

    h2 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 1rem
    }

    .subtitle {
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 1.5rem
    }

    .card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 1.25rem
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      color: var(--color-text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s
    }

    .btn:hover {
      background: var(--color-background-secondary)
    }

    .btn:active {
      transform: scale(0.98)
    }

    .btn-primary {
      background: var(--color-text-primary);
      color: var(--color-background-primary);
      border-color: var(--color-text-primary)
    }

    .btn-primary:hover {
      opacity: 0.85;
      background: var(--color-text-primary)
    }

    .btn-sm {
      padding: 7px 14px;
      font-size: 13px
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1.5rem
    }

    .meta-card {
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      padding: 12px;
      text-align: center
    }

    .meta-card .val {
      font-size: 22px;
      font-weight: 500
    }

    .meta-card .lbl {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 2px
    }

    /* Quiz screen */
    .progress-bar-wrap {
      background: var(--color-background-secondary);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 1.5rem;
      overflow: hidden
    }

    .progress-bar {
      height: 100%;
      background: var(--color-text-primary);
      border-radius: 99px;
      transition: width 0.3s
    }

    .q-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem
    }

    .q-num {
      font-size: 13px;
      color: var(--color-text-secondary)
    }

    .timer {
      font-size: 14px;
      font-weight: 500;
      background: var(--color-background-secondary);
      padding: 4px 12px;
      border-radius: 99px
    }

    .timer.warn {
      color: #A32D2D
    }

    .q-text {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 1.25rem;
      font-weight: 500
    }

    .q-sub {
      font-size: 12px;
      color: var(--color-text-secondary);
      margin-top: 4px;
      font-weight: 400
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 1.25rem
    }

    .opt {
      padding: 11px 14px;
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      cursor: pointer;
      font-size: 14px;
      line-height: 1.5;
      transition: all 0.15s;
      background: var(--color-background-primary)
    }

    .opt:hover:not(.disabled) {
      background: var(--color-background-secondary);
      border-color: var(--color-border-secondary)
    }

    .opt.selected {
      border-color: var(--color-text-primary);
      background: var(--color-background-secondary)
    }

    .opt.correct {
      background: #EAF3DE;
      border-color: #3B6D11;
      color: #173404
    }

    .opt.wrong {
      background: #FCEBEB;
      border-color: #A32D2D;
      color: #501313
    }

    .opt.reveal-correct {
      background: #EAF3DE;
      border-color: #3B6D11;
      color: #173404
    }

    .opt.disabled {
      cursor: default
    }

    .feedback {
      padding: 10px 14px;
      border-radius: var(--border-radius-md);
      font-size: 13px;
      margin-bottom: 1rem;
      display: none
    }

    .feedback.show {
      display: block
    }

    .feedback.correct {
      background: #EAF3DE;
      color: #173404
    }

    .feedback.wrong {
      background: #FCEBEB;
      color: #501313
    }

    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px
    }

    .q-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem
    }

    .filter-btn {
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 99px;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      cursor: pointer;
      color: var(--color-text-secondary)
    }

    .filter-btn.active {
      background: var(--color-text-primary);
      color: var(--color-background-primary);
      border-color: var(--color-text-primary)
    }

    /* Results */
    .score-big {
      font-size: 48px;
      font-weight: 500;
      text-align: center;
      margin: 1rem 0 4px
    }

    .score-label {
      text-align: center;
      font-size: 14px;
      color: var(--color-text-secondary);
      margin-bottom: 1.5rem
    }

    .grade-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 1.5rem
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto
    }

    .result-item {
      padding: 10px 14px;
      border-radius: var(--border-radius-md);
      font-size: 13px;
      border: 0.5px solid var(--color-border-tertiary)
    }

    .result-item.correct {
      border-color: #3B6D11;
      background: #EAF3DE
    }

    .result-item.wrong {
      border-color: #A32D2D;
      background: #FCEBEB
    }

    .result-item.skipped {
      border-color: var(--color-border-secondary);
      background: var(--color-background-secondary)
    }

    .section-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 1rem;
      flex-wrap: wrap
    }

    .stab {
      padding: 5px 12px;
      font-size: 12px;
      border-radius: 99px;
      border: 0.5px solid var(--color-border-secondary);
      background: transparent;
      cursor: pointer;
      color: var(--color-text-secondary)
    }

    .stab.active {
      background: var(--color-text-primary);
      color: var(--color-background-primary);
      border-color: var(--color-text-primary)
    }
  </style>
</head>

<body>

  <!-- HOME -->
  <div id="home" class="screen active">
    <h1>MPPEB Forest Guard / Jail Prahari</h1>
    <p class="subtitle">Previous Year Paper — 26 May 2023, Shift 1 &nbsp;·&nbsp; 100 Questions</p>
    <div class="meta-grid">
      <div class="meta-card">
        <div class="val">100</div>
        <div class="lbl">Total questions</div>
      </div>
      <div class="meta-card">
        <div class="val">90</div>
        <div class="lbl">Min per section</div>
      </div>
      <div class="meta-card">
        <div class="val">4</div>
        <div class="lbl">Sections</div>
      </div>
      <div class="meta-card">
        <div class="val" id="best-score-home">—</div>
        <div class="lbl">Best score</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <p style="font-size:14px;font-weight:500;margin-bottom:10px">Choose mode</p>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="radio"
            name="mode" value="full" checked> Full test (100 Qs, timed)</label>
        <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="radio"
            name="mode" value="gk"> General Knowledge (Q1–20)</label>
        <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="radio"
            name="mode" value="english"> English (Q21–40)</label>
        <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="radio"
            name="mode" value="science"> Science & Maths (Q41–80)</label>
        <label style="display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer"><input type="radio"
            name="mode" value="hindi"> Hindi (Q81–100)</label>
      </div>
    </div>

    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="startQuiz()"><i class="ti ti-player-play"></i> Start quiz</button>
      <button class="btn btn-sm" onclick="showHistory()"><i class="ti ti-chart-bar"></i> My history</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="screen">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="q-header">
      <span class="q-num" id="q-num">Q 1 / 100</span>
      <span class="timer" id="timer">90:00</span>
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
    </div>
    <div class="nav-row">
      <button class="btn btn-sm" id="prev-btn" onclick="prevQ()"><i class="ti ti-arrow-left"></i> Prev</button>
      <button class="btn btn-sm" onclick="skipQ()">Skip</button>
      <button class="btn btn-sm btn-primary" id="next-btn" onclick="nextQ()">Next <i
          class="ti ti-arrow-right"></i></button>
    </div>
    <div style="margin-top:1rem;text-align:center">
      <button class="btn btn-sm" style="color:#A32D2D;border-color:#A32D2D"
        onclick="if(confirm('End quiz and see results?')) finishQuiz()"><i class="ti ti-flag"></i> Finish</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="screen">
    <h2>Quiz complete!</h2>
    <div style="text-align:center">
      <div class="score-big" id="score-big">0/100</div>
      <div class="score-label" id="score-label"></div>
      <span class="grade-badge" id="grade-badge"></span>
    </div>
    <div class="meta-grid" style="margin-bottom:1.25rem">
      <div class="meta-card">
        <div class="val" id="r-correct">0</div>
        <div class="lbl">Correct</div>
      </div>
      <div class="meta-card">
        <div class="val" id="r-wrong">0</div>
        <div class="lbl">Wrong</div>
      </div>
      <div class="meta-card">
        <div class="val" id="r-skip">0</div>
        <div class="lbl">Skipped</div>
      </div>
      <div class="meta-card">
        <div class="val" id="r-pct">0%</div>
        <div class="lbl">Score %</div>
      </div>
    </div>
    <p style="font-size:14px;font-weight:500;margin-bottom:10px">Question review</p>
    <div class="section-tabs">
      <button class="stab active" onclick="filterResults('all',this)">All</button>
      <button class="stab" onclick="filterResults('wrong',this)">Wrong</button>
      <button class="stab" onclick="filterResults('correct',this)">Correct</button>
      <button class="stab" onclick="filterResults('skipped',this)">Skipped</button>
    </div>
    <div class="results-list" id="results-list"></div>
    <div style="display:flex;gap:8px;margin-top:1.5rem;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="goHome()"><i class="ti ti-home"></i> Home</button>
      <button class="btn btn-sm" onclick="retryWrong()"><i class="ti ti-refresh"></i> Retry wrong</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="history" class="screen">
    <h2>My history</h2>
    <div id="history-list"></div>
    <button class="btn btn-sm" style="margin-top:1rem" onclick="goHome()"><i class="ti ti-arrow-left"></i> Back</button>
  </div>

  <script>
    const ALL_QUESTIONS = [
      { q: "Who is considered the father of Indian railways?", opts: ["Lord Dufferin", "Lord Mountbatten", "Lord Dalhousie", "Lord Canning"], ans: 2, section: "GK" },
      { q: "Who was conferred with the 54th Jnanpith Award?", opts: ["Amitav Ghosh", "Arundhati Roy", "Jhumpa Lahiri", "Rahul Mahajan"], ans: 0, section: "GK" },
      { q: "Who is the author of the book \"One Indian Girl\"?", opts: ["Arvind Adiga", "Chetan Bhagat", "Shashi Tharoor", "Jhumpa Lahiri"], ans: 1, section: "GK" },
      { q: "Which state observed Dr BR Ambedkar's birth anniversary as 'Equality Day' on 14 April 2022?", opts: ["Tamil Nadu", "Gujarat", "Karnataka", "Maharashtra"], ans: 0, section: "GK" },
      { q: "Which Insurance Company tied up with actyv.ai to sell insurance products to MSMEs?", opts: ["Sahyog Life Insurance", "Tata Capital Life Insurance", "Aditya Life Insurance", "Kotak General Insurance"], ans: 3, section: "GK" },
      { q: "_______, one of the major dance forms of India, originated from Andhra Pradesh.", opts: ["Kathak", "Kuchipudi", "Manipuri", "Yakshagana"], ans: 1, section: "GK" },
      { q: "Which of the following statements about UPSC chairmen are false?\n(i) RN Banerjee was the first chairman after independence.\n(ii) After Constitution came into force, first chairman was SK Kriplani.", opts: ["Neither (i) nor (ii)", "Only (ii)", "(i) and (ii) both", "Only (i)"], ans: 2, section: "GK" },
      { q: "Tedros Adhanom Ghebreyesus is the Director General of ________.", opts: ["WHO", "UNDP", "ILO", "IAEA"], ans: 0, section: "GK" },
      { q: "Which statements about SC/ST Article 338 are true?\n(i) Art.338 provided for a special officer for SC/ST.\n(ii) Officer oversees all matters of constitutional protection.\n(iii) Officer submits report to President after inspection.", opts: ["(i), (ii), (iii)", "Only (i)", "Only (ii)", "(i) and (ii)"], ans: 0, section: "GK" },
      { q: "Jainism was divided into _______.", opts: ["Two Sects", "Six Sects", "Four Sects", "Sixteen Sects"], ans: 0, section: "GK" },
      { q: "Which cricketer was named Wisden Leading T20 Cricketer of the Year 2023?", opts: ["Kane Williamson", "Rohit Sharma", "Suryakumar Yadav", "Virat Kohli"], ans: 2, section: "GK" },
      { q: "The Siberian ibex is the most famous attraction of a park. It is situated in which state?", opts: ["Himachal Pradesh", "Assam", "Mizoram", "Arunachal Pradesh"], ans: 0, section: "GK" },
      { q: "According to UNHCR (Oct 2022), which country hosted the largest refugee population?", opts: ["UAE", "Turkey", "Indonesia", "Australia"], ans: 1, section: "GK" },
      { q: "'Gwalior's Bagh', a village, is famous for _________.", opts: ["Cave Painting", "Handloom & handicraft", "Sports village of MP", "White Tiger"], ans: 0, section: "GK" },
      { q: "Creepers are:", opts: ["Plants with weak stems", "Plants with no stems", "Plants that take support and climb", "Plants with hard stems"], ans: 0, section: "GK" },
      { q: "How many days' notice must be given before proposing removal of the Vice President?", opts: ["15", "12", "14", "16"], ans: 2, section: "GK" },
      { q: "In which state did PM Modi virtually inaugurate the National Conference of Environment Ministers (Sep 2022)?", opts: ["Maharashtra", "Uttar Pradesh", "Madhya Pradesh", "Gujarat"], ans: 3, section: "GK" },
      { q: "Who is the current Director General of the World Trade Organization (WTO)?", opts: ["Nkosazana Dlamini Zuma", "Ngozi Okonjo-Iweala", "Roger Nkodo Dang", "William Raperd"], ans: 1, section: "GK" },
      { q: "Who was the co-creator of fictional characters like Spider-Man, Iron Man, Hulk etc.?", opts: ["Jack Kirby", "Arthur Conan Doyle", "Stan Lee", "Hergé"], ans: 2, section: "GK" },
      { q: "Which nation was the first to introduce the Preamble?", opts: ["India", "US", "UK", "France"], ans: 1, section: "GK" },
      { q: "Select the correct substitution for the bracket: 'A lot of TV shows now (portray honestly depictions)...'", opts: ["Portrayal honestly depictions", "No correction required", "Portray honest depictions", "Portrayal honest depictions"], ans: 2, section: "English" },
      { q: "Rearrange sentences to form a paragraph:\nP. This fancy led to many of his most important discoveries...\nQ. Even if it doesn't, his work for science will bear fruit...\nR. Faraday's genius was allied to that of the old philosophers...\nS. He entertained the idea that gravitation, electricity, heat...", opts: ["SQRP", "SPRQ", "RSPQ", "RPQS"], ans: 2, section: "English" },
      { q: "Rearrange sentences:\nP. There were times when they walked, talking like old men and women.\nQ. Perhaps they would discuss the story of the snake...\nR. Rather a puzzle, that snake...\nS. Yet David was a sober, young man...", opts: ["QRPS", "QSRP", "PQRS", "PSRQ"], ans: 2, section: "English" },
      { q: "Find the error: 'The Australian team is expected to assemble in the city on February 6 and the players are likely to have a practice session in the evening'", opts: ["in the city on February 6 and the players", "No error", "are likely to have a practice session in the evening.", "The Australian team is expected to assemble"], ans: 1, section: "English" },
      { q: "Select the correctly spelt word.", opts: ["Commendation", "Tomorow", "Advisable", "Coherent"], ans: 0, section: "English" },
      { q: "Rearrange sentences:\nP. Once you realize you're the only person responsible...\nQ. When you're working for yourself, you play the role of the boss and employee.\nR. As your own boss, you have no one looking over your shoulder...\nS. Therefore, it's very important to be disciplined.", opts: ["QRSP", "PQSR", "SRQP", "RPQS"], ans: 0, section: "English" },
      { q: "Fill in the blank: 'As he went through the street on an __________ that morning, he saw a woman with a cat under her arm.'", opts: ["encasement", "objection", "amendment", "errand"], ans: 3, section: "English" },
      { q: "Select the antonym of: COHERENT", opts: ["consistent", "illegible", "illogical", "constant"], ans: 2, section: "English" },
      { q: "Select the most appropriate antonym of: LIBERTY", opts: ["reservation", "slavery", "freedom", "autonomy"], ans: 1, section: "English" },
      { q: "Select the word similar in meaning to: Upsurge", opts: ["Reluctance", "Repletion", "Renewal", "Relocation"], ans: 2, section: "English" },
      { q: "Select the correct synonym of: INTREPID", opts: ["audacious", "spineless", "feeble", "sissy"], ans: 0, section: "English" },
      { q: "Rearrange sentences:\nP. Betty, at the same time, noted an arrow indicating a sharp curve ahead.\nQ. The late-afternoon traffic on the highway to Benton was becoming heavy.\nR. Betty turned from the main road onto a narrow, less-used one.\nS. Presently, in her mirror, she saw a red truck behind her...", opts: ["QRSP", "PQRS", "QSPR", "PSRQ"], ans: 0, section: "English" },
      { q: "Convert to passive voice: 'See! Dinesh has painted this house beautifully.'", opts: ["See! This house had been beautifully painted by Dinesh.", "See! This house has been beautifully painted by Dinesh.", "See! This house was being beautifully painted under Dinesh.", "It is seen that this house has been beautifully painted with Dinesh."], ans: 1, section: "English" },
      { q: "Convert to indirect speech: Shanker said to his friend, \"Look out! There is a snake behind you.\"", opts: ["Seeing a snake behind him, Shanker asked his friend to look out.", "Shanker exclaimed to his friend with surprise that there was a snake behind him.", "Shanker warned his friend that there was a snake behind him.", "Shanker told his friend to look out as there was a snake behind him."], ans: 2, section: "English" },
      { q: "Convert to indirect speech: Everybody said, \"How well she sings!\"", opts: ["Everybody told us that she sings very well.", "Everybody told us that how she sang very well.", "Everybody exclaimed that she sang very well.", "Everybody exclaimed that she sings very well."], ans: 2, section: "English" },
      { q: "Convert to indirect speech: \"Mohan made this mess. Let him clear it up\", said his father.", opts: ["Mohan's father said that Mohan had made that mess and suggested that he clear it.", "Mohan's father said that Mohan had made that mess and proposed that he clear it up.", "Mohan's father said that Mohan had made that mess and he was to clear it.", "Mohan's father said that Mohan had made that mess and that he should clear it."], ans: 3, section: "English" },
      { q: "Rearrange sentences:\nP. She assumed it was a ball used for shot-put contests.\nQ. Presently she found what felt like a cannon ball.\nR. She began to feel around the floor with her feet...\nS. She hoped that a hard blow would break the wire as well as the glass.", opts: ["PQSR", "SRQP", "SPRQ", "PSQR"], ans: 1, section: "English" },
      { q: "Select the most appropriate word: Violation or misuse of what is regarded as sacred.", opts: ["Remedy", "Benediction", "Devotion", "Sacrilege"], ans: 3, section: "English" },
      { q: "Fill in the blank: 'The ___________ needs of the inhabitants seem to be fruit, iced drinks, shiny boots, and lottery tickets.'", opts: ["principle", "principal", "invincible", "amiable"], ans: 1, section: "English" },
      { q: "Rearrange sentences:\nP. But it is levied only upon those which are by that assessment undertaxed.\nQ. This additional tax is rated upon all the different districts.\nR. In order to remedy this inequality, the government imposed upon the whole generality a tax.\nS. By 1727, this assessment had become altogether unequal.", opts: ["SPQR", "SRQP", "QRSP", "RQPS"], ans: 1, section: "English" },
      { q: "If a ball is thrown vertically up at a speed of 3 m/s, find the maximum height it will reach. (g = 10 m/s²)", opts: ["0.75 m", "1.00 m", "0.60 m", "0.45 m"], ans: 3, section: "Science" },
      { q: "Iron in stainless steel is mixed with _____.", opts: ["Ni and Cr", "Cu and Cr", "Ni and Cu", "Cu and Au"], ans: 0, section: "Science" },
      { q: "Bauxite is the ore of _____.", opts: ["Copper", "Aluminium", "Iron", "Mercury"], ans: 1, section: "Science" },
      { q: "Which of the following is NOT an Endocrine Gland?", opts: ["Liver", "Testes", "Ovary", "Pancreas"], ans: 0, section: "Science" },
      { q: "Which gas is exhaled during the breathing process?", opts: ["Helium", "Nitrogen", "Carbon dioxide", "Oxygen"], ans: 2, section: "Science" },
      { q: "The law of constant proportions was enunciated by:", opts: ["Berthelot", "Dalton", "Avogadro", "Proust"], ans: 3, section: "Science" },
      { q: "Which of the following animals is NOT known as a ruminant?", opts: ["Buffalo", "Deer", "Cow", "Dog"], ans: 3, section: "Science" },
      { q: "What is Mercury Sulfide's common name?", opts: ["Mohr's Salt", "Potash Alum", "Vermilion", "Marsh Gas"], ans: 2, section: "Science" },
      { q: "Who is often referred to as 'Father of Taxonomy'?", opts: ["Ronald Ross", "Charles Darwin", "Carl Linnaeus", "Robert Hooke"], ans: 2, section: "Science" },
      { q: "An emulsion is a colloidal solution of –", opts: ["Solid in liquid", "Gas in solid", "Liquid in liquid", "Solid in Solid"], ans: 2, section: "Science" },
      { q: "Water covers about _____ of the Earth's surface.", opts: ["75%", "60%", "45%", "35%"], ans: 0, section: "Science" },

    let questions = [], userAnswers = [], currentQ = 0, timerInterval = null, secondsLeft = 5400, quizMode = 'full', wrongQs = [];

    function getStorage() { try { return window.storage } catch (e) { return null } }

    async function loadBestScore() {
      try { const r = await window.storage.get('quiz_best'); if (r) { document.getElementById('best-score-home').textContent = JSON.parse(r.value).score + '%'; } } catch (e) { }
    }

    async function saveBestScore(pct) {
      try {
        let best = 0;
        try { const r = await window.storage.get('quiz_best'); if (r) best = JSON.parse(r.value).score; } catch (e) { }
        if (pct > best) await window.storage.set('quiz_best', JSON.stringify({ score: pct, date: new Date().toLocaleDateString() }));
      } catch (e) { }
    }

    async function saveHistory(correct, total, pct, mode) {
      try {
        let hist = [];
        try { const r = await window.storage.get('quiz_history'); if (r) hist = JSON.parse(r.value); } catch (e) { }
        hist.unshift({ correct, total, pct, mode, date: new Date().toLocaleDateString() });
        hist = hist.slice(0, 10);
        await window.storage.set('quiz_history', JSON.stringify(hist));
      } catch (e) { }
    }

    function getQsByMode(mode) {
      if (mode === 'full') return ALL_QUESTIONS.map((_, i) => i);
      if (mode === 'gk') return ALL_QUESTIONS.map((_, i) => i).filter(i => ALL_QUESTIONS[i].section === 'GK');
      if (mode === 'english') return ALL_QUESTIONS.map((_, i) => i).filter(i => ALL_QUESTIONS[i].section === 'English');
      if (mode === 'science') return ALL_QUESTIONS.map((_, i) => i).filter(i => ALL_QUESTIONS[i].section === 'Science' || ALL_QUESTIONS[i].section === 'Maths');
      if (mode === 'hindi') return ALL_QUESTIONS.map((_, i) => i).filter(i => ALL_QUESTIONS[i].section === 'Hindi');
      return wrongQs.slice();
    }

    function startQuiz() {
      quizMode = document.querySelector('input[name="mode"]:checked').value;
      const indices = getQsByMode(quizMode);
      questions = indices.map(i => ({ ...ALL_QUESTIONS[i], origIdx: i }));
      userAnswers = new Array(questions.length).fill(-1);
      currentQ = 0;
      secondsLeft = quizMode === 'full' ? 5400 : Math.min(questions.length * 54, 5400);
      showScreen('quiz');
      renderQ();
      startTimer();
    }

    function startTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        secondsLeft--;
        updateTimer();
        if (secondsLeft <= 0) { clearInterval(timerInterval); finishQuiz(); }
      }, 1000);
    }

    function updateTimer() {
      const m = Math.floor(secondsLeft / 60), s = secondsLeft % 60;
      const el = document.getElementById('timer');
      el.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
      el.classList.toggle('warn', secondsLeft < 300);
    }

    function renderQ() {
      const q = questions[currentQ];
      document.getElementById('q-num').textContent = 'Q ' + (currentQ + 1) + ' / ' + questions.length;
      document.getElementById('progress-bar').style.width = (((currentQ + 1) / questions.length) * 100) + '%';
      document.getElementById('q-text').innerHTML = q.q.replace(/\n/g, '<br>') + (q.section !== 'Hindi' ? '<div class="q-sub">Section: ' + q.section + '</div>' : '');
      const optsEl = document.getElementById('options');
      optsEl.innerHTML = '';
      const answered = userAnswers[currentQ] > -1;
      q.opts.forEach((opt, i) => {
        const d = document.createElement('div');
        d.className = 'opt' + (answered ? ' disabled' : '');
        if (answered) {
          if (i === q.ans) d.classList.add('reveal-correct');
          if (i === userAnswers[currentQ] && i !== q.ans) d.classList.add('wrong');
          if (i === userAnswers[currentQ] && i === q.ans) d.classList.add('correct');
        }
        d.textContent = opt;
        if (!answered) d.onclick = () => selectAnswer(i);
        optsEl.appendChild(d);
      });
      const fb = document.getElementById('feedback');
      if (answered) {
        const correct = userAnswers[currentQ] === q.ans;
        fb.className = 'feedback show ' + (correct ? 'correct' : 'wrong');
        fb.textContent = correct ? '✓ Correct!' : '✗ Wrong. Correct answer: ' + q.opts[q.ans];
      } else {
        fb.className = 'feedback';
      }
      document.getElementById('prev-btn').style.opacity = currentQ === 0 ? '0.4' : '1';
    }

    function selectAnswer(idx) {
      if (userAnswers[currentQ] > -1) return;
      userAnswers[currentQ] = idx;
      renderQ();
    }

    function nextQ() {
      if (currentQ < questions.length - 1) { currentQ++; renderQ(); }
      else finishQuiz();
    }

    function prevQ() { if (currentQ > 0) { currentQ--; renderQ(); } }

    function skipQ() {
      if (userAnswers[currentQ] === -1) userAnswers[currentQ] = -2;
      nextQ();
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function finishQuiz() {
      clearInterval(timerInterval);
      const correct = userAnswers.filter((a, i) => a === questions[i].ans).length;
      const wrong = userAnswers.filter((a, i) => a > -1 && a !== -2 && a !== questions[i].ans).length;
      const skip = userAnswers.filter(a => a === -1 || a === -2).length;
      const pct = Math.round((correct / questions.length) * 100);
      wrongQs = questions.filter((_, i) => userAnswers[i] > -1 && userAnswers[i] !== -2 && userAnswers[i] !== questions[i].ans).map(q => q.origIdx);
      document.getElementById('score-big').textContent = correct + '/' + questions.length;
      document.getElementById('score-label').textContent = 'You scored ' + pct + '% on ' + questions.length + ' questions';
      document.getElementById('r-correct').textContent = correct;
      document.getElementById('r-wrong').textContent = wrong;
      document.getElementById('r-skip').textContent = skip;
      document.getElementById('r-pct').textContent = pct + '%';
      const gb = document.getElementById('grade-badge');
      let grade, color;
      if (pct >= 80) { grade = 'Excellent'; color = 'background:#EAF3DE;color:#173404' }
      else if (pct >= 60) { grade = 'Good'; color = 'background:#E6F1FB;color:#042C53' }
      else if (pct >= 40) { grade = 'Average'; color = 'background:#FAEEDA;color:#412402' }
      else { grade = 'Needs work'; color = 'background:#FCEBEB;color:#501313' }
      gb.textContent = grade; gb.style.cssText = color;
      renderResults('all');
      saveBestScore(pct);
      saveHistory(correct, questions.length, pct, quizMode);
      showScreen('results');
    }

    let currentFilter = 'all';
    function filterResults(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderResults(type);
    }

    function renderResults(filter) {
      const list = document.getElementById('results-list');
      list.innerHTML = '';
      questions.forEach((q, i) => {
        const a = userAnswers[i];
        const isCorrect = a === q.ans;
        const isWrong = a > -1 && a !== -2 && !isCorrect;
        const isSkip = a === -1 || a === -2;
        if (filter === 'correct' && !isCorrect) return;
        if (filter === 'wrong' && !isWrong) return;
        if (filter === 'skipped' && !isSkip) return;
        const d = document.createElement('div');
        d.className = 'result-item ' + (isCorrect ? 'correct' : isWrong ? 'wrong' : 'skipped');
        const qText = q.q.length > 80 ? q.q.substring(0, 80) + '…' : q.q;
        d.innerHTML = '<strong>Q' + (i + 1) + ': </strong>' + qText + '<br>' + (isSkip ? '<span>Skipped</span>' : '<span>Your answer: ' + q.opts[a] + '</span>' + (isWrong ? '<br><span>Correct: ' + q.opts[q.ans] + '</span>' : ''));
        list.appendChild(d);
      });
      if (list.children.length === 0) list.innerHTML = '<p style="color:var(--color-text-secondary);font-size:13px;padding:1rem">No questions in this category.</p>';
    }

    function retryWrong() {
      if (wrongQs.length === 0) { alert('No wrong answers to retry!'); return; }
      quizMode = 'retry';
      questions = wrongQs.map(i => ({ ...ALL_QUESTIONS[i], origIdx: i }));
      userAnswers = new Array(questions.length).fill(-1);
      currentQ = 0;
      secondsLeft = questions.length * 60;
      showScreen('quiz');
      renderQ();
      startTimer();
    }

    async function showHistory() {
      showScreen('history');
      const list = document.getElementById('history-list');
      list.innerHTML = '<p style="color:var(--color-text-secondary);font-size:13px">Loading...</p>';
      try {
        const r = await window.storage.get('quiz_history');
        if (!r) { list.innerHTML = '<p style="color:var(--color-text-secondary);font-size:14px">No history yet. Take a quiz first!</p>'; return; }
        const hist = JSON.parse(r.value);
        list.innerHTML = '';
        hist.forEach(h => {
          const d = document.createElement('div');
          d.style.cssText = 'padding:10px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:8px;font-size:13px';
          d.innerHTML = '<strong>' + h.pct + '%</strong> — ' + h.correct + '/' + h.total + ' correct &nbsp;·&nbsp; <span style="color:var(--color-text-secondary)">Mode: ' + h.mode + ' &nbsp;·&nbsp; ' + h.date + '</span>';
          list.appendChild(d);
        });
      } catch (e) { list.innerHTML = '<p style="color:var(--color-text-secondary);font-size:13px">Could not load history.</p>'; }
    }

    function goHome() {
      clearInterval(timerInterval);
      loadBestScore();
      showScreen('home');
    }

    loadBestScore();
  </script>
</body>

</html>
